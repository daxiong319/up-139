version: '3.8'

services:
  up-139:
    build: .
    container_name: up-139
    ports:
      - "33303:33303"
    volumes:
      # 持久化数据目录
      - ./data:/app/data
    environment:
      - TZ=Asia/Shanghai
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    networks:
      - up139-network

networks:
  up139-network:
    driver: bridge

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UP-139 媒体上传监控</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .header {
            background: white;
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .header h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 10px;
        }
        
        .header p {
            color: #666;
            font-size: 14px;
        }
        
        .status-bar {
            background: white;
            border-radius: 16px;
            padding: 20px 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .status-indicator {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #e74c3c;
            animation: pulse 2s infinite;
        }
        
        .status-dot.running {
            background: #27ae60;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .status-text {
            font-size: 16px;
            font-weight: 600;
            color: #333;
        }
        
        .controls {
            display: flex;
            gap: 10px;
        }
        
        .btn {
            padding: 10px 24px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        .btn-start {
            background: #27ae60;
            color: white;
        }
        
        .btn-stop {
            background: #e74c3c;
            color: white;
        }
        
        .btn-restart {
            background: #3498db;
            color: white;
        }
        
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        @media (max-width: 968px) {
            .grid {
                grid-template-columns: 1fr;
            }
        }
        
        .panel {
            background: white;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 2px solid #f0f0f0;
        }
        
        .panel-title {
            font-size: 18px;
            font-weight: 600;
            color: #333;
        }
        
        .panel-actions {
            display: flex;
            gap: 10px;
        }
        
        .btn-small {
            padding: 6px 12px;
            font-size: 12px;
        }
        
        .log-container {
            background: #1e1e1e;
            color: #d4d4d4;
            border-radius: 8px;
            padding: 15px;
            max-height: 500px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            line-height: 1.6;
        }
        
        .log-line {
            margin-bottom: 4px;
        }
        
        .log-line .timestamp {
            color: #6a9955;
        }
        
        .notification-item {
            padding: 10px;
            margin-bottom: 10px;
            background: #f8f9fa;
            border-radius: 8px;
            border-left: 4px solid #3498db;
        }
        
        .notification-time {
            font-size: 12px;
            color: #999;
            margin-bottom: 5px;
        }
        
        .notification-content {
            font-size: 14px;
            color: #333;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
        }
        
        .stat-value {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 5px;
        }
        
        .stat-label {
            font-size: 12px;
            opacity: 0.9;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎬 UP-139 媒体上传监控</h1>
            <p>智能监控 qBittorrent 下载，自动上传至 Alist 云盘</p>
        </div>
        
        <div class="status-bar">
            <div class="status-indicator">
                <div class="status-dot" id="statusDot"></div>
                <span class="status-text" id="statusText">停止状态</span>
            </div>
            <div class="controls">
                <button class="btn btn-start" id="btnStart" onclick="startMonitor()">▶ 启动</button>
                <button class="btn btn-stop" id="btnStop" onclick="stopMonitor()" disabled>⏹ 停止</button>
                <button class="btn btn-restart" id="btnRestart" onclick="restartMonitor()">🔄 重启</button>
            </div>
        </div>
        
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value" id="statProcessed">0</div>
                <div class="stat-label">已处理种子</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="statSuccess">0</div>
                <div class="stat-label">上传成功</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="statOrganized">0</div>
                <div class="stat-label">整理完成</div>
            </div>
        </div>
        
        <div class="grid">
            <div class="panel">
                <div class="panel-header">
                    <span class="panel-title">📋 实时日志</span>
                    <div class="panel-actions">
                        <button class="btn btn-small" onclick="refreshLogs()">🔄 刷新</button>
                        <button class="btn btn-small" onclick="clearLogs()">🗑️ 清空</button>
                    </div>
                </div>
                <div class="log-container" id="logContainer">
                    <div class="loading">加载中...</div>
                </div>
            </div>
            
            <div class="panel">
                <div class="panel-header">
                    <span class="panel-title">🔔 最近通知</span>
                    <div class="panel-actions">
                        <button class="btn btn-small" onclick="refreshNotifications()">🔄 刷新</button>
                    </div>
                </div>
                <div id="notificationContainer" style="max-height: 500px; overflow-y: auto;">
                    <div class="loading">加载中...</div>
                </div>
            </div>
        </div>
        
        <div class="panel">
            <div class="panel-header">
                <span class="panel-title">📊 已处理记录</span>
                <div class="panel-actions">
                    <button class="btn btn-small" onclick="refreshProcessed()">🔄 刷新</button>
                </div>
            </div>
            <div id="processedContainer" style="max-height: 400px; overflow-y: auto;">
                <div class="loading">加载中...</div>
            </div>
        </div>
    </div>
    
    <script>
        let ws = null;
        
        async function getStatus() {
            try {
                const res = await fetch('/api/status');
                const data = await res.json();
                updateStatus(data.running);
            } catch (err) {
                console.error('获取状态失败:', err);
            }
        }
        
        function updateStatus(running) {
            const dot = document.getElementById('statusDot');
            const text = document.getElementById('statusText');
            const btnStart = document.getElementById('btnStart');
            const btnStop = document.getElementById('btnStop');
            
            if (running) {
                dot.classList.add('running');
                text.textContent = '运行中';
                btnStart.disabled = true;
                btnStop.disabled = false;
            } else {
                dot.classList.remove('running');
                text.textContent = '停止状态';
                btnStart.disabled = false;
                btnStop.disabled = true;
            }
        }
        
        async function startMonitor() {
            try {
                const res = await fetch('/api/start', { method: 'POST' });
                const data = await res.json();
                alert(data.message);
                getStatus();
            } catch (err) {
                alert('启动失败: ' + err.message);
            }
        }
        
        async function stopMonitor() {
            try {
                const res = await fetch('/api/stop', { method: 'POST' });
                const data = await res.json();
                alert(data.message);
                getStatus();
            } catch (err) {
                alert('停止失败: ' + err.message);
            }
        }
        
        async function restartMonitor() {
            try {
                const res = await fetch('/api/restart', { method: 'POST' });
                const data = await res.json();
                alert(data.message);
                getStatus();
            } catch (err) {
                alert('重启失败: ' + err.message);
            }
        }
        
        async function refreshLogs() {
            try {
                const res = await fetch('/api/logs?lines=100');
                const data = await res.json();
                displayLogs(data.logs);
            } catch (err) {
                console.error('刷新日志失败:', err);
            }
        }
        
        function displayLogs(logs) {
            const container = document.getElementById('logContainer');
            if (!logs || logs.length === 0) {
                container.innerHTML = '<div class="loading">暂无日志</div>';
                return;
            }
            
            container.innerHTML = logs.map(line => {
                const match = line.match(/\[(.*?)\]/);
                if (match) {
                    return `<div class="log-line"><span class="timestamp">[${match[1]}]</span>${line.substring(match[0].length)}</div>`;
                }
                return `<div class="log-line">${line}</div>`;
            }).join('');
            
            container.scrollTop = container.scrollHeight;
        }
        
        function clearLogs() {
            document.getElementById('logContainer').innerHTML = '<div class="loading">日志已清空</div>';
        }
        
        async function refreshNotifications() {
            try {
                const res = await fetch('/api/notifications');
                const data = await res.json();
                displayNotifications(data.notifications);
            } catch (err) {
                console.error('刷新通知失败:', err);
            }
        }
        
        function displayNotifications(notifications) {
            const container = document.getElementById('notificationContainer');
            if (!notifications || notifications.length === 0) {
                container.innerHTML = '<div class="loading">暂无通知</div>';
                return;
            }
            
            container.innerHTML = notifications.map(notif => {
                const match = notif.match(/\[(.*?)\]\s*(.*)/);
                if (match) {
                    return `
                        <div class="notification-item">
                            <div class="notification-time">${match[1]}</div>
                            <div class="notification-content">${match[2]}</div>
                        </div>
                    `;
                }
                return `<div class="notification-item"><div class="notification-content">${notif}</div></div>`;
            }).join('');
        }
        
        async function refreshProcessed() {
            try {
                const res = await fetch('/api/processed');
                const data = await res.json();
                displayProcessed(data.processed);
            } catch (err) {
                console.error('刷新记录失败:', err);
            }
        }
        
        function displayProcessed(processed) {
            const container = document.getElementById('processedContainer');
            if (!processed || Object.keys(processed).length === 0) {
                container.innerHTML = '<div class="loading">暂无记录</div>';
                return;
            }
            
            let processedCount = Object.keys(processed).length;
            let successCount = Object.values(processed).filter(p => p.upload_status === 'completed').length;
            let organizedCount = Object.values(processed).filter(p => p.organize_status === 'organized').length;
            
            document.getElementById('statProcessed').textContent = processedCount;
            document.getElementById('statSuccess').textContent = successCount;
            document.getElementById('statOrganized').textContent = organizedCount;
            
            const items = Object.entries(processed).slice(-20).reverse();
            container.innerHTML = items.map(([hash, info]) => `
                <div class="notification-item">
                    <div class="notification-time">${info.name || '未知'}</div>
                    <div class="notification-content">
                        状态: ${info.upload_status || 'unknown'} | 
                        整理: ${info.organize_status || 'pending'} | 
                        完成时间: ${info.completed_at || 'N/A'}
                    </div>
                </div>
            `).join('');
        }
        
        function connectWebSocket() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            ws = new WebSocket(`${protocol}//${window.location.host}/ws/logs`);
            
            ws.onmessage = function(event) {
                const container = document.getElementById('logContainer');
                const line = document.createElement('div');
                line.className = 'log-line';
                
                const match = event.data.match(/\[(.*?)\]/);
                if (match) {
                    line.innerHTML = `<span class="timestamp">[${match[1]}]</span>${event.data.substring(match[0].length)}`;
                } else {
                    line.textContent = event.data;
                }
                
                container.appendChild(line);
                container.scrollTop = container.scrollHeight;
            };
            
            ws.onerror = function(err) {
                console.error('WebSocket错误:', err);
            };
        }
        
        // 初始化
        window.onload = function() {
            getStatus();
            refreshLogs();
            refreshNotifications();
            refreshProcessed();
            connectWebSocket();
            
            // 定时刷新
            setInterval(getStatus, 5000);
            setInterval(refreshLogs, 10000);
        };
    </script>
</body>
</html>
